version: '3.8'

services:
  backend:
    image: eclipse-temurin:17-jre-jammy
    working_dir: /app
    volumes:
      - ./backend:/app
    command: java -jar target/backend-0.0.1-SNAPSHOT.jar
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
